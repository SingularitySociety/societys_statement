title: Singularity Society Statement
description: シンギュラリティ・ソサイエティの行動規範・カルチャー・開発の心得をまとめたドキュメントサイト
lang: ja

remote_theme: just-the-docs/just-the-docs

url: https://singularitysociety.github.io
baseurl: /societys_statement

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
  - jekyll-readme-index
  - jekyll-seo-tag

# front matter の無いページにもテーマ（レイアウト）を適用する
defaults:
  - scope:
      path: ""
    values:
      layout: default

search_enabled: true
search:
  heading_level: 2
  previews: 3
heading_anchors: true
color_scheme: light

aux_links:
  "GitHub で見る":
    - https://github.com/SingularitySociety/societys_statement
aux_links_new_tab: true

gh_edit_link: true
gh_edit_link_text: GitHub で編集
gh_edit_repository: https://github.com/SingularitySociety/societys_statement
gh_edit_branch: main
gh_edit_view_mode: tree

exclude:
  - "*.md~"
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - plans/
  - scratchpad/
  - presentation.md
